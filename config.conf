
# =====================================================
# Linux Monitor Configuration File
# =====================================================


# -----------------------------
# Resource Alert Thresholds
# -----------------------------

# CPU usage percentage
CPU_WARNING=60
CPU_CRITICAL=80


# Memory usage percentage
MEMORY_WARNING=75
MEMORY_CRITICAL=90


# Disk usage percentage
DISK_WARNING=80
DISK_CRITICAL=90



# -----------------------------
# Log Configuration
# -----------------------------

LOG_DIR="logs"

SYSTEM_LOG="$LOG_DIR/system_report.log"

ALERT_LOG="$LOG_DIR/alerts.log"



# -----------------------------
# Report Configuration
# -----------------------------

REPORT_DIR="reports"

DATE_FORMAT="%Y-%m-%d"

TIME_FORMAT="%H:%M:%S"



# -----------------------------
# Services To Monitor
# -----------------------------

SERVICES="
ssh
cron
docker
apache2
nginx
mysql
"



# -----------------------------
# Network Configuration
# -----------------------------

CHECK_INTERNET=true

PING_TARGET="8.8.8.8"



# -----------------------------
# Monitoring Settings
# -----------------------------

ENABLE_CPU_MONITOR=true

ENABLE_MEMORY_MONITOR=true

ENABLE_DISK_MONITOR=true

ENABLE_NETWORK_MONITOR=true

ENABLE_PROCESS_MONITOR=true

ENABLE_SERVICE_MONITOR=true

ENABLE_SSH_MONITOR=true

ENABLE_LOG_MONITOR=true



# -----------------------------
# Report Settings
# -----------------------------

GENERATE_REPORT=true

SAVE_HISTORY=true
